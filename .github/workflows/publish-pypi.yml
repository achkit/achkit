name: publish-pypi

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # PyPI trusted publishing (OIDC, no token needed)

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Test
        working-directory: py
        run: |
          pip install pytest
          pip install -e .
          pytest -q
      - name: Build
        working-directory: py
        run: |
          pip install build
          python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: py/dist
